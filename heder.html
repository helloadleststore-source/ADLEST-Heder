<!-- =========================================
ADLEST REALTIME WISHLIST FIX
FORTHWALL SAME TAB LIVE UPDATE
========================================= -->

<script>
/* =========================================
   GLOBAL LIVE WISHLIST UPDATE FUNCTION
========================================= */

function updateLiveWishlistBadges() {

  try {

    /* LOCAL STORAGE GET */
    const wishlistItems =
      JSON.parse(
        localStorage.getItem('adlest_global_wishlist_items')
        || '[]'
      );

    const count = wishlistItems.length;

    /* DESKTOP BADGE */
    const dBadge =
      document.getElementById('adl-dk-heart-badge');

    if(dBadge){

      dBadge.innerText = count;

      dBadge.style.display =
        count > 0 ? 'flex' : 'none';
    }

    /* MOBILE BADGE */
    const mBadge =
      document.getElementById('adl-mb-heart-badge');

    if(mBadge){

      mBadge.innerText = count;

      mBadge.style.display =
        count > 0 ? 'flex' : 'none';
    }

    /* DESKTOP DROPDOWN */
    const dkDropdownList =
      document.getElementById('adl-dk-wl-dropdown-list');

    if(dkDropdownList){

      if(count === 0){

        dkDropdownList.innerHTML =
        `
        <div class="adl-hd-wl-empty">
          Your wishlist is empty
        </div>
        `;

      } else {

        let html = '';

        const reversed =
          wishlistItems.slice().reverse();

        reversed.forEach(item => {

          if(!item) return;

          html += `
          <a href="${item.url || '#'}"
             class="adl-hd-wl-row">

            <img
              src="${item.image || ''}"
              class="adl-hd-wl-img"
              alt="${item.title || 'Wishlist'}">

            <div class="adl-hd-wl-info">

              <span class="adl-hd-wl-name">
                ${item.title || 'Product'}
              </span>

              <span class="adl-hd-wl-price">
                ${item.price || '$0.00'}
              </span>

            </div>

          </a>
          `;
        });

        dkDropdownList.innerHTML = html;
      }
    }

  } catch(error){

    console.error(
      'Wishlist Update Error:',
      error
    );

  }
}

/* =========================================
   CUSTOM EVENT LISTENER
   SAME TAB REALTIME UPDATE
========================================= */

window.addEventListener(
  'wishlistUpdated',
  function(e){

    updateLiveWishlistBadges();

  }
);

/* =========================================
   STORAGE EVENT
   OTHER TAB UPDATE
========================================= */

window.addEventListener(
  'storage',
  function(e){

    if(
      e.key === 'adlest_global_wishlist_items'
    ){

      updateLiveWishlistBadges();

    }

  }
);

/* =========================================
   PAGE LOAD INIT
========================================= */

document.addEventListener(
  'DOMContentLoaded',
  function(){

    updateLiveWishlistBadges();

  }
);

/* =========================================
   OPTIONAL AUTO POLLING BACKUP
========================================= */

setInterval(function(){

  updateLiveWishlistBadges();

},1000);

</script>

<!-- =========================================
PRODUCT PAGE WISHLIST BUTTON CODE
ADD THIS AFTER localStorage.setItem
========================================= -->

<script>

/* EXAMPLE */

function addToWishlist(product){

  let wishlist =
    JSON.parse(
      localStorage.getItem(
        'adlest_global_wishlist_items'
      ) || '[]'
    );

  wishlist.push(product);

  localStorage.setItem(
    'adlest_global_wishlist_items',
    JSON.stringify(wishlist)
  );

  /* =====================================
     REALTIME HEADER UPDATE EVENT
  ===================================== */

  window.dispatchEvent(

    new CustomEvent(
      'wishlistUpdated',
      {
        detail:{
          count:wishlist.length
        }
      }
    )

  );

}

</script>
